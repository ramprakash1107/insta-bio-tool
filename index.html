<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Elite Tank Arena Pro | @rp_gupta_07</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <style>
        :root {
            --primary: #00f2ff;
            --accent: #ff0055;
            --bg: #0a0a0c;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; touch-action: none;
        }

        #ui-layer { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
        #menu { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; pointer-events: all;
        }

        canvas { display: block; background: #111; }

        .btn {
            padding: 15px 40px; border: none; border-radius: 50px;
            font-weight: 900; cursor: pointer; margin: 10px;
            transition: 0.3s; text-transform: uppercase; pointer-events: all;
        }
        .btn-primary { background: var(--primary); color: #000; box-shadow: 0 0 20px rgba(0,242,255,0.4); }
        
        .hud {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.5); padding: 10px 20px;
            border-left: 4px solid var(--primary);
        }

        #killFeed {
            position: absolute; top: 20px; right: 20px; text-align: right;
            font-size: 12px; color: var(--primary);
        }

        .controls-hint {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            font-size: 10px; color: #555;
        }

        input {
            background: rgba(255,255,255,0.1); border: 1px solid var(--primary);
            padding: 12px; border-radius: 10px; color: #fff; text-align: center;
            margin-bottom: 20px; outline: none; width: 250px;
        }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="font-size: 40px; margin: 0; letter-spacing: 5px;">TANK <span style="color:var(--primary)">ARENA</span></h1>
    <p style="color: #666; font-size: 12px; margin-bottom: 30px;">PRO MULTIPLAYER BY @RP_GUPTA_07</p>
    
    <input type="text" id="playerName" placeholder="ENTER YOUR NAME" maxlength="10">
    <input type="text" id="roomCode" placeholder="ROOM CODE (JOIN/CREATE)">
    
    <button class="btn btn-primary" onclick="startGame()">ENTER BATTLE</button>
</div>

<div id="ui-layer">
    <div class="hud">
        <div id="myHp">HP: 100</div>
        <div id="myScore" style="font-size: 24px; font-weight: 900;">KILLS: 0</div>
    </div>
    <div id="killFeed"></div>
    <div class="controls-hint">WASD / ARROWS TO MOVE • SPACE / CLICK TO FIRE</div>
</div>

<canvas id="gameCanvas"></canvas>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// --- FIREBASE CONFIGURATION ---
const firebaseConfig = {
    apiKey: "AIzaSyARuO_pN2vdYrVKYkKHHaNys7WI8HqM6I4",
    authDomain: "friendchat-43941.firebaseapp.com",
    databaseURL: "https://friendchat-43941-default-rtdb.firebaseio.com",
    projectId: "friendchat-43941",
    storageBucket: "friendchat-43941.firebasestorage.app",
    messagingSenderId: "1026542245723",
    appId: "1:1026542245723:web:b892bfcc1d2358a018ac7e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- GAME VARIABLES ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let world = { width: 2000, height: 2000 };
let player = {
    id: Math.random().toString(36).substr(2, 9),
    name: "Guest",
    x: 100, y: 100, angle: 0, hp: 100, kills: 0, color: `hsl(${Math.random()*360}, 70%, 50%)`
};
let others = {};
let bullets = [];
let keys = {};
let room = "lobby";
let gameActive = false;

// --- INITIALIZATION ---
function startGame() {
    const nameInput = document.getElementById('playerName').value.trim();
    const roomInput = document.getElementById('roomCode').value.trim();
    
    if(!nameInput || !roomInput) return alert("Fill Name and Room Code!");
    
    player.name = nameInput;
    room = roomInput;
    
    document.getElementById('menu').style.display = 'none';
    gameActive = true;
    
    // Initial spawn
    player.x = Math.random() * 800 + 100;
    player.y = Math.random() * 800 + 100;

    initNetworking();
    requestAnimationFrame(gameLoop);
}

function initNetworking() {
    const playerRef = db.ref(`tanks/${room}/players/${player.id}`);
    const bulletRef = db.ref(`tanks/${room}/bullets`);

    // Update my data
    setInterval(() => {
        if(gameActive) {
            playerRef.set({
                x: player.x, y: player.y, angle: player.angle,
                hp: player.hp, name: player.name, color: player.color, kills: player.kills
            });
        }
    }, 50);

    // Remove on disconnect
    playerRef.onDisconnect().remove();

    // Listen for other players
    db.ref(`tanks/${room}/players`).on('value', snap => {
        const data = snap.val() || {};
        others = data;
        if(data[player.id]) {
            player.hp = data[player.id].hp;
            player.kills = data[player.id].kills;
        }
    });

    // Listen for bullets
    bulletRef.on('child_added', snap => {
        const b = snap.val();
        if(b.ownerId !== player.id) {
            bullets.push(b);
        }
    });
}

// --- CONTROLS ---
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
window.addEventListener('mousedown', fireBullet);

function fireBullet() {
    if(!gameActive || player.hp <= 0) return;
    
    const bId = Math.random().toString(36).substr(2, 5);
    const bData = {
        id: bId,
        ownerId: player.id,
        x: player.x + Math.cos(player.angle) * 30,
        y: player.y + Math.sin(player.angle) * 30,
        vx: Math.cos(player.angle) * 10,
        vy: Math.sin(player.angle) * 10,
        dist: 0
    };
    
    db.ref(`tanks/${room}/bullets/${bId}`).set(bData);
    // Remove bullet after 2 seconds from DB
    setTimeout(() => db.ref(`tanks/${room}/bullets/${bId}`).remove(), 2000);
    
    // Client-side prediction
    bullets.push(bData);
}

// --- GAME LOGIC ---
function update() {
    if(player.hp <= 0) {
        player.x = -1000; // Move away while dead
        setTimeout(() => { 
            player.hp = 100; 
            player.x = Math.random() * 800; 
            player.y = Math.random() * 800;
            db.ref(`tanks/${room}/players/${player.id}`).update({hp: 100, x: player.x, y: player.y});
        }, 3000);
        return;
    }

    if(keys['KeyW'] || keys['ArrowUp']) {
        player.x += Math.cos(player.angle) * 4;
        player.y += Math.sin(player.angle) * 4;
    }
    if(keys['KeyS'] || keys['ArrowDown']) {
        player.x -= Math.cos(player.angle) * 2;
        player.y -= Math.sin(player.angle) * 2;
    }
    if(keys['KeyA'] || keys['ArrowLeft']) player.angle -= 0.05;
    if(keys['KeyD'] || keys['ArrowRight']) player.angle += 0.05;

    // Update Bullets & Collision
    bullets.forEach((b, index) => {
        b.x += b.vx;
        b.y += b.vy;
        b.dist += 1;

        // Check if bullet hits ME
        if(b.ownerId !== player.id) {
            let dx = b.x - player.x;
            let dy = b.y - player.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if(dist < 25) {
                player.hp -= 10;
                bullets.splice(index, 1);
                db.ref(`tanks/${room}/players/${player.id}`).update({hp: player.hp});
                
                if(player.hp <= 0) {
                   db.ref(`tanks/${room}/players/${b.ownerId}/kills`).transaction(c => (c || 0) + 1);
                }
            }
        }
        if(b.dist > 100) bullets.splice(index, 1);
    });

    // UI Update
    document.getElementById('myHp').innerText = `HP: ${player.hp}`;
    document.getElementById('myScore').innerText = `KILLS: ${player.kills}`;
}

function draw() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw Grid (World)
    ctx.strokeStyle = "#222";
    for(let i=0; i<world.width; i+=50) {
        ctx.beginPath(); ctx.moveTo(i - player.x + canvas.width/2, 0); ctx.lineTo(i - player.x + canvas.width/2, canvas.height); ctx.stroke();
    }
    for(let i=0; i<world.height; i+=50) {
        ctx.beginPath(); ctx.moveTo(0, i - player.y + canvas.height/2); ctx.lineTo(canvas.width, i - player.y + canvas.height/2); ctx.stroke();
    }

    // Draw Others
    Object.keys(others).forEach(id => {
        const p = others[id];
        if(id === player.id) return;
        drawTank(p.x, p.y, p.angle, p.color, p.name, p.hp);
    });

    // Draw Me
    if(player.hp > 0) {
        drawTank(player.x, player.y, player.angle, player.color, player.name, player.hp);
    } else {
        ctx.fillStyle = "white";
        ctx.fillText("RESPAWNING...", canvas.width/2 - 50, canvas.height/2);
    }

    // Draw Bullets
    bullets.forEach(b => {
        ctx.fillStyle = varColor('--primary');
        ctx.beginPath();
        ctx.arc(b.x - player.x + canvas.width/2, b.y - player.y + canvas.height/2, 4, 0, Math.PI*2);
        ctx.fill();
    });
}

function drawTank(x, y, angle, color, name, hp) {
    const screenX = x - player.x + canvas.width/2;
    const screenY = y - player.y + canvas.height/2;

    ctx.save();
    ctx.translate(screenX, screenY);
    
    // Name & HP Bar
    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.font = "12px Arial";
    ctx.fillText(name, 0, -35);
    
    ctx.fillStyle = "#333";
    ctx.fillRect(-20, -30, 40, 5);
    ctx.fillStyle = hp > 30 ? "#00ff88" : "#ff0055";
    ctx.fillRect(-20, -30, (hp/100)*40, 5);

    // Tank Body
    ctx.rotate(angle);
    ctx.fillStyle = color;
    ctx.fillRect(-20, -15, 40, 30); // Body
    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.fillRect(5, -5, 25, 10); // Barrel
    ctx.restore();
}

function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }

function gameLoop() {
    update();
    draw();
    if(gameActive) requestAnimationFrame(gameLoop);
}

// Resizing
window.onresize = () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
};
</script>
</body>
</html>
