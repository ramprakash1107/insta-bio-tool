<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Elite Arena Pro | @rp_gupta_07</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
<style>
:root { 
    --primary: #00f2ff; --secondary: #7000ff; --bg: #030303; 
    --card: rgba(255, 255, 255, 0.03); --win: #00ff88; 
    --me: linear-gradient(135deg, #0084ff, #00c6ff); --other: #1a1a1a; --accent: #ff0055;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); color: #fff; font-family: 'Segoe UI', system-ui; overflow: hidden; }

/* 1. Dynamic Background */
.bg-glow { position: fixed; inset: 0; background: radial-gradient(circle at center, #111 0%, #000 100%); z-index: -1; }
.bg-glow::after { content: ''; position: absolute; width: 200%; height: 200%; background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); opacity: 0.1; }

.container { display: flex; flex-direction: column; height: 100%; max-width: 450px; margin: auto; border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); }

/* 2. Professional UI elements */
.hero-title { font-size: 45px; font-weight: 900; text-align: center; letter-spacing: -2px; line-height: 0.8; margin-bottom: 20px; text-transform: uppercase; font-style: italic; }
.hero-title span { display: block; font-size: 20px; color: var(--primary); letter-spacing: 5px; font-style: normal; margin-top: 5px; }

input { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #222; background: #111; color: #fff; font-size: 16px; transition: 0.3s; }
input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0,242,255,0.2); }

.grid-select { display: flex; gap: 10px; margin: 15px 0; width: 100%; }
.grid-btn { flex: 1; padding: 15px; background: #111; border: 2px solid #222; color: #fff; border-radius: 12px; cursor: pointer; font-weight: 900; transition: 0.3s; }
.grid-btn.active { border-color: var(--primary); background: rgba(0,242,255,0.1); color: var(--primary); }

.btn-main { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.2s; position: relative; overflow: hidden; }
.btn-primary { background: var(--primary); color: #000; }
.btn-primary:active { transform: scale(0.95); }

/* 3. Game Board Enhancements */
#board { display: grid; gap: 10px; margin: 20px auto; padding: 10px; border-radius: 20px; background: rgba(255,255,255,0.02); }
.cell { background: #0a0a0a; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; border: 2px solid #1a1a1a; transition: 0.2s; position: relative; }
.cell:hover { background: #151515; }
.cell.winner-cell { background: var(--win) !important; color: #000 !important; box-shadow: 0 0 40px var(--win); z-index: 5; }

/* 4. Scoreboard Glow */
.score-box { text-align: center; padding: 10px; border-radius: 15px; flex: 1; border: 2px solid #1a1a1a; transition: 0.5s; }
.active-turn { border-color: var(--primary); box-shadow: 0 0 20px rgba(0,242,255,0.2); background: rgba(0,242,255,0.05); }

/* 5. Chat UI */
.chat-section { height: 150px; background: #000; border-top: 1px solid #222; display: flex; flex-direction: column; }
#messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
.msg { max-width: 85%; padding: 8px 15px; border-radius: 18px; font-size: 13px; font-weight: 500; }
.me { align-self: flex-end; background: var(--me); color: #fff; }
.other { align-self: flex-start; background: #222; }

.hidden { display: none !important; }
</style>
</head>
<body>

<div class="bg-glow"></div>

<div id="winnerOverlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9999; display:none; flex-direction:column; align-items:center; justify-content:center; backdrop-filter:blur(10px);">
    <h2 style="letter-spacing:5px; color:#555;">MATCH ENDED</h2>
    <h1 id="winnerName" style="font-size: 60px; color: var(--win); text-shadow: 0 0 30px var(--win); margin: 10px 0;">YOU WIN</h1>
    <button onclick="restartMatch()" class="btn-main btn-primary" style="width: 250px;">REMATCH</button>
</div>

<div class="container">
    <div id="loginScreen" class="screen">
        <h1 class="hero-title">ELITE<span>ARENA PRO</span></h1>
        <p style="color:#444; font-size:12px; margin-bottom:30px; font-weight:bold;">CREATED BY @RP_GUPTA_07</p>
        
        <input id="userName" placeholder="ENTER YOUR NAME">
        
        <div class="grid-select">
            <button class="grid-btn active" id="g3" onclick="setGrid(3)">3 X 3</button>
            <button class="grid-btn" id="g5" onclick="setGrid(5)">5 X 5</button>
        </div>

        <button class="btn-main btn-primary" onclick="createRoom()">CREATE ONLINE ARENA</button>
        <button class="btn-main" style="background:#1a1a1a; color:var(--secondary); border:1px solid var(--secondary); margin-top:5px;" onclick="startRobot()">SOLO VS AI (EXPERT)</button>
        
        <div style="display:flex; gap:10px; margin-top:20px; width:100%;">
            <input id="joinCode" placeholder="ARENA CODE" style="flex:1;">
            <button onclick="joinRoom()" style="background:#fff; color:#000; border:none; padding:0 20px; border-radius:15px; font-weight:900;">JOIN</button>
        </div>
    </div>

    <div id="gameScreen" class="hidden" style="display:flex; flex-direction:column; height: 100%;">
        <div style="padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #111;">
            <button onclick="location.reload()" style="background:none; border:1px solid #333; color:#fff; padding:8px 15px; border-radius:10px; font-size:12px; font-weight:bold;">EXIT</button>
            <div id="status" style="color:var(--primary); font-weight:900; font-size:14px; letter-spacing:1px;">YOUR TURN</div>
            <div id="displayRoomCode" style="color:#555; font-weight:bold;">ID: 0000</div>
        </div>

        <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;">
            <div style="display:flex; width:100%; gap:15px; margin-bottom:20px;">
                <div id="boxX" class="score-box">
                    <div id="p1Name" style="font-size:10px; color:#666; text-transform:uppercase;">Player X</div>
                    <div id="p1Score" style="font-size:24px; font-weight:900; color:var(--primary);">0</div>
                </div>
                <div id="boxO" class="score-box">
                    <div id="p2Name" style="font-size:10px; color:#666; text-transform:uppercase;">Player O</div>
                    <div id="p2Score" style="font-size:24px; font-weight:900; color:var(--accent);">0</div>
                </div>
            </div>
            <div id="board"></div>
        </div>

        <div class="chat-section">
            <div id="messages"></div>
            <div style="display:flex; padding:10px; gap:8px; background:#050505;">
                <input id="msgInput" placeholder="Send a message..." style="margin:0; flex:1; padding:12px; border:none; border-radius:12px;">
                <button onclick="sendMsg()" style="background:var(--primary); border:none; width:50px; border-radius:12px; color:#000; font-weight:900;">➤</button>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// Firebase initialization
const firebaseConfig = {
  apiKey: "AIzaSyARuO_pN2vdYrVKYkKHHaNys7WI8HqM6I4",
  authDomain: "friendchat-43941.firebaseapp.com",
  databaseURL: "https://friendchat-43941-default-rtdb.firebaseio.com",
  projectId: "friendchat-43941",
  storageBucket: "friendchat-43941.firebasestorage.app",
  messagingSenderId: "1026542245723",
  appId: "1:1026542245723:web:b892bfcc1d2358a018ac7e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let myRoomId, myName, mySymbol, gameRef, chatRef, gridSize = 3, isRobot = false;

// 6. Audio System फिक्स (Browser policy के लिए यूजर इंटरैक्शन जरूरी है)
const sounds = {
    move: new Howl({ src: ['https://cdn.pixabay.com/audio/2022/03/15/audio_78390a1391.mp3'], volume: 0.5 }),
    win: new Howl({ src: ['https://cdn.pixabay.com/audio/2021/08/04/audio_0625906354.mp3'], volume: 0.8 }),
    lose: new Howl({ src: ['https://cdn.pixabay.com/audio/2021/08/04/audio_3e02917711.mp3'], volume: 0.5 }),
    msg: new Howl({ src: ['https://cdn.pixabay.com/audio/2022/03/10/audio_c35278d35a.mp3'], volume: 0.3 })
};

function setGrid(s) {
    gridSize = s;
    document.querySelectorAll('.grid-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('g'+s).classList.add('active');
}

function startRobot() {
    myName = document.getElementById("userName").value.trim() || "Pro_Player";
    isRobot = true; myRoomId = "AI_ARENA_" + Math.floor(Math.random()*999);
    setupGame("X");
}

function createRoom() {
    myName = document.getElementById("userName").value.trim() || "Host";
    myRoomId = Math.floor(1000 + Math.random()*8999).toString();
    isRobot = false; setupGame("X");
}

function joinRoom() {
    myName = document.getElementById("userName").value.trim() || "Guest";
    myRoomId = document.getElementById("joinCode").value.trim();
    if(!myRoomId) return;
    isRobot = false; setupGame("O");
}

function setupGame(sym) {
    mySymbol = sym;
    gameRef = db.ref("rooms/" + myRoomId + "/game");
    chatRef = db.ref("rooms/" + myRoomId + "/chat");

    if(sym === "X") {
        gameRef.set({ 
            board: Array(gridSize*gridSize).fill(""), 
            turn: "X", size: gridSize, scores: {X:0, O:0}, 
            players: {X: myName, O: isRobot ? "ROBOT_AI" : "WAITING..."} 
        });
    } else {
        gameRef.child("players/O").set(myName);
    }

    document.getElementById("loginScreen").classList.add("hidden");
    document.getElementById("gameScreen").classList.remove("hidden");
    document.getElementById("displayRoomCode").innerText = "ARENA: " + myRoomId;
    createBoard(); listenGame(); listenChat();
}

function createBoard() {
    const board = document.getElementById("board");
    board.innerHTML = "";
    let cellSize = gridSize === 3 ? 100 : 70;
    board.style.gridTemplateColumns = `repeat(${gridSize}, ${cellSize}px)`;
    for(let i=0; i < gridSize * gridSize; i++) {
        const cell = document.createElement("div");
        cell.className = "cell"; cell.id = "c" + i;
        cell.style.width = cellSize + "px"; cell.style.height = cellSize + "px";
        cell.style.fontSize = (cellSize/1.8) + "px";
        cell.onclick = () => move(i);
        board.appendChild(cell);
    }
}

function move(i) {
    gameRef.once("value", snap => {
        const g = snap.val();
        if(!g || g.turn !== mySymbol || g.board[i] !== "" || checkWinner(g.board, g.size)) return;
        
        // Vibration for mobile
        if(navigator.vibrate) navigator.vibrate(50);
        
        sounds.move.play();
        g.board[i] = mySymbol;
        updateGameState(g);
    });
}

function updateGameState(g) {
    let nextTurn = g.turn === "X" ? "O" : "X";
    let updateData = { board: g.board, turn: nextTurn };
    
    const win = checkWinner(g.board, g.size);
    if(win && win !== "draw") {
        g.scores[win.w]++;
        updateData.scores = g.scores;
        sounds.win.play();
    }
    gameRef.update(updateData);
}

// 7. Unbeatable Robot AI (Minimax Algorithm)
function getBestMove(board, size) {
    let emptyCells = board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
    
    // 1. Check if AI can win in next move
    for(let i of emptyCells) {
        let b = [...board]; b[i] = "O";
        if(checkWinner(b, size)) return i;
    }
    // 2. Block Player if they are winning
    for(let i of emptyCells) {
        let b = [...board]; b[i] = "X";
        if(checkWinner(b, size)) return i;
    }
    // 3. Center is priority
    let center = Math.floor((size*size)/2);
    if(board[center] === "") return center;
    
    // 4. Random but smart
    return emptyCells[Math.floor(Math.random() * emptyCells.length)];
}

function listenGame() {
    gameRef.on("value", snap => {
        const g = snap.val(); if(!g) return;
        
        document.getElementById("p1Name").innerText = g.players.X;
        document.getElementById("p2Name").innerText = g.players.O;
        document.getElementById("p1Score").innerText = g.scores.X;
        document.getElementById("p2Score").innerText = g.scores.O;

        document.getElementById("boxX").className = "score-box " + (g.turn === "X" ? "active-turn" : "");
        document.getElementById("boxO").className = "score-box " + (g.turn === "O" ? "active-turn" : "");

        g.board.forEach((v, i) => { 
            const c = document.getElementById("c"+i);
            if(c.innerText !== v) {
                c.innerText = v;
                c.style.transform = "scale(1.1)";
                setTimeout(() => c.style.transform = "scale(1)", 200);
            }
            c.style.color = v === 'X' ? 'var(--primary)' : 'var(--accent)'; 
        });

        const winData = checkWinner(g.board, g.size);
        if(winData) {
            if(winData !== "draw") {
                winData.line.forEach(idx => document.getElementById("c"+idx).classList.add("winner-cell"));
                document.getElementById("winnerName").innerText = (winData.w === "X" ? g.players.X : g.players.O).toUpperCase();
                setTimeout(() => {
                    document.getElementById("winnerOverlay").style.display = "flex";
                    if(winData.w === mySymbol) confetti({particleCount: 200, spread: 70});
                }, 1000);
            } else {
                document.getElementById("winnerName").innerText = "DRAW";
                document.getElementById("winnerOverlay").style.display = "flex";
            }
        } else {
            document.getElementById("winnerOverlay").style.display = "none";
            document.getElementById("status").innerText = g.turn === mySymbol ? "YOUR TURN" : "OPPONENT THINKING...";
            
            if(isRobot && g.turn === "O") {
                setTimeout(() => {
                    let moveIdx = getBestMove(g.board, g.size);
                    if(moveIdx !== undefined) {
                        sounds.move.play();
                        g.board[moveIdx] = "O";
                        updateGameState(g);
                    }
                }, 1000);
            }
        }
    });
}

function checkWinner(b, size) {
    const lines = [];
    if(size === 3) {
        lines.push([0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]);
    } else {
        // 5x5 simple logic (4 in a row)
        for(let i=0; i<5; i++) {
            for(let j=0; j<2; j++) {
                lines.push([i*5+j, i*5+j+1, i*5+j+2, i*5+j+3]);
                lines.push([j*5+i, (j+1)*5+i, (j+2)*5+i, (j+3)*5+i]);
            }
        }
    }
    for(let l of lines) {
        if(b[l[0]] && l.every(idx => b[idx] === b[l[0]])) return {w: b[l[0]], line: l};
    }
    return b.includes("") ? null : "draw";
}

function restartMatch() { 
    gameRef.update({ board: Array(gridSize*gridSize).fill(""), turn: "X" }); 
}

function sendMsg() {
    const i = document.getElementById("msgInput");
    if(!i.value) return;
    chatRef.push({ n: myName, m: i.value }); i.value = "";
}

function listenChat() {
    chatRef.on("child_added", snap => {
        const d = snap.val();
        sounds.msg.play();
        const m = document.createElement("div");
        m.className = "msg " + (d.n === myName ? "me" : "other");
        m.innerHTML = `<span style="font-size:8px; opacity:0.5; display:block;">${d.n}</span>${d.m}`;
        document.getElementById("messages").appendChild(m);
        document.getElementById("messages").scrollTop = 1000;
    });
}
</script>
</body>
</html>
